<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0d14"/>
<title>FamilyChat 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;
  --surface:#16161f;
  --surface2:#1e1e2a;
  --surface3:#26263a;
  --border:#2e2e42;
  --accent:#6c63ff;
  --accent2:#ff6b9d;
  --green:#4affa0;
  --yellow:#ffd166;
  --text:#f0f0f8;
  --muted:#8888aa;
  --radius:16px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif}

/* ── LOGIN ─────────────────────────────────────────── */
#loginScreen{
  display:flex;align-items:center;justify-content:center;
  height:100vh;
  background:radial-gradient(ellipse at 30% 20%, #1a1030 0%, var(--bg) 60%);
}
.login-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 36px;
  width:min(380px,92vw);
  box-shadow:var(--shadow);
}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-family:'Fredoka One',cursive;font-size:32px;color:var(--accent);letter-spacing:1px}
.login-logo p{color:var(--muted);font-size:14px;margin-top:4px}
.avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px}
.avatar-btn{
  background:var(--surface2);border:2px solid var(--border);border-radius:12px;
  padding:10px 4px;cursor:pointer;transition:all .2s;text-align:center;
}
.avatar-btn:hover,.avatar-btn.selected{border-color:var(--accent);background:rgba(108,99,255,.12)}
.avatar-btn .av-emoji{font-size:22px;display:block}
.avatar-btn .av-name{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600}
.inp{
  width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;margin-bottom:12px;
}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.btn-primary{
  width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;
  color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-primary:hover{background:#7c74ff;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.login-err{color:#ff6b6b;font-size:12px;text-align:center;margin-top:8px;display:none}

/* ── APP LAYOUT ────────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:column}
.app-shell{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ───────────────────────────────────────── */
.sidebar{
  width:280px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
@media(max-width:700px){
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:100;
    transition:left .3s;box-shadow:var(--shadow)}
  .sidebar.open{left:0}
}
.sidebar-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.my-avatar{
  width:38px;height:38px;border-radius:50%;background:var(--surface3);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.my-info{flex:1;min-width:0}
.my-name{font-weight:700;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.my-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.my-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block}

.sidebar-section{padding:12px 16px 6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700}

.room-list{overflow-y:auto;flex:1}
.room-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  cursor:pointer;transition:background .15s;border-left:3px solid transparent;
}
.room-item:hover{background:var(--surface2)}
.room-item.active{background:rgba(108,99,255,.12);border-left-color:var(--accent)}
.room-icon{
  width:40px;height:40px;border-radius:12px;background:var(--surface3);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.room-info{flex:1;min-width:0}
.room-name{font-weight:700;font-size:13px}
.room-desc{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.room-badge{
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;padding:0 4px;
}

.online-section{border-top:1px solid var(--border);padding:12px 16px}
.online-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
.online-list{display:flex;flex-wrap:wrap;gap:6px}
.online-user{
  display:flex;align-items:center;gap:5px;padding:4px 8px;
  background:var(--surface2);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  transition:background .15s;
}
.online-user:hover{background:var(--surface3)}
.online-dot{width:6px;height:6px;background:var(--green);border-radius:50%}

/* ── CHAT AREA ─────────────────────────────────────── */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

.chat-header{
  padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.menu-btn{
  display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;
  padding:4px;border-radius:8px;
}
@media(max-width:700px){.menu-btn{display:flex}}
.chat-header-icon{font-size:22px}
.chat-header-info{flex:1}
.chat-header-name{font-weight:700;font-size:16px}
.chat-header-sub{font-size:11px;color:var(--muted)}

.messages-area{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:4px;
  background:radial-gradient(ellipse at 50% 100%, #111120 0%, var(--bg) 70%);
}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Datas e sistema */
.msg-date{
  text-align:center;margin:12px 0 4px;
}
.msg-date span{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);font-size:10px;padding:4px 12px;border-radius:20px;
}

/* Mensagens */
.msg-group{display:flex;flex-direction:column;gap:2px}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:80%}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row.other{align-self:flex-start}

.msg-avatar{
  width:28px;height:28px;border-radius:50%;background:var(--surface3);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  margin-bottom:2px;
}
.msg-avatar.hidden{opacity:0}

.msg-bubble{
  padding:9px 13px;border-radius:18px;max-width:100%;word-break:break-word;
  font-size:13.5px;line-height:1.5;position:relative;
}
.msg-row.mine .msg-bubble{
  background:var(--accent);color:#fff;border-bottom-right-radius:4px;
}
.msg-row.other .msg-bubble{
  background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;
}
.msg-sender{font-size:10px;font-weight:700;margin-bottom:3px;opacity:.8}
.msg-time{font-size:10px;opacity:.55;margin-top:3px;text-align:right}

/* Imagem na mensagem */
.msg-img{max-width:220px;border-radius:12px;cursor:pointer;display:block;margin-bottom:4px}
.msg-file{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:rgba(0,0,0,.2);border-radius:10px;font-size:12px;cursor:pointer;
  text-decoration:none;color:inherit;
}
.msg-file-icon{font-size:20px}

/* Reply preview */
.reply-preview{
  border-left:3px solid var(--accent2);padding:4px 8px;
  background:rgba(0,0,0,.2);border-radius:6px;margin-bottom:6px;
  font-size:11px;color:var(--muted);
}

/* Typing indicator */
.typing-indicator{
  display:none;align-items:center;gap:6px;padding:8px 16px;
  font-size:12px;color:var(--muted);
}
.typing-dots{display:flex;gap:3px}
.typing-dots span{
  width:5px;height:5px;background:var(--muted);border-radius:50%;
  animation:bounce .8s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input area */
.input-area{
  padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);
}
.reply-bar{
  display:none;align-items:center;gap:8px;padding:6px 10px;
  background:var(--surface2);border-radius:10px;margin-bottom:8px;
  border-left:3px solid var(--accent2);font-size:12px;
}
.reply-bar-text{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}

.input-row{display:flex;align-items:flex-end;gap:8px}
.attach-btn,.send-btn,.voice-btn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  flex-shrink:0;transition:all .15s;
}
.attach-btn{background:var(--surface2);color:var(--muted)}
.attach-btn:hover{background:var(--surface3);color:var(--text)}
.voice-btn{background:var(--surface2);color:var(--muted)}
.voice-btn:hover{background:var(--surface3);color:var(--text)}
.send-btn{background:var(--accent);color:#fff}
.send-btn:hover{background:#7c74ff;transform:scale(1.05)}

.msg-input{
  flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;resize:none;max-height:120px;line-height:1.4;
  transition:border-color .2s;
}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:var(--muted)}

/* ── MODAL DE CHAMADA ────────────────────────────────── */
.call-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);
}
.call-box{
  background:var(--surface);border:1px solid var(--border);border-radius:28px;
  padding:40px 32px;text-align:center;width:min(340px,90vw);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.call-avatar{font-size:64px;margin-bottom:12px}
.call-name{font-family:'Fredoka One';font-size:26px;color:var(--text);margin-bottom:4px}
.call-status{font-size:13px;color:var(--muted);margin-bottom:28px}
.call-timer{font-size:22px;font-weight:700;color:var(--green);margin-bottom:20px;display:none}
.call-actions{display:flex;justify-content:center;gap:20px}
.call-btn{
  width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:24px;
  transition:all .2s;
}
.call-btn.end{background:#ff4757}
.call-btn.end:hover{background:#ff6b7a;transform:scale(1.1)}
.call-btn.accept{background:var(--green)}
.call-btn.accept:hover{transform:scale(1.1)}
.call-btn.mute{background:var(--surface2)}
.call-btn.mute:hover{background:var(--surface3)}
.call-audio-vis{display:flex;align-items:center;justify-content:center;gap:3px;height:30px;margin-bottom:16px}
.call-audio-vis span{
  width:3px;background:var(--green);border-radius:2px;
  animation:audiowave 1.2s infinite ease-in-out;min-height:4px;
}
.call-audio-vis span:nth-child(1){animation-delay:0s}
.call-audio-vis span:nth-child(2){animation-delay:.1s}
.call-audio-vis span:nth-child(3){animation-delay:.2s}
.call-audio-vis span:nth-child(4){animation-delay:.3s}
.call-audio-vis span:nth-child(5){animation-delay:.4s}
@keyframes audiowave{
  0%,100%{height:4px}50%{height:24px}
}

/* ── LIGHTBOX IMAGEM ─────────────────────────────────── */
.lightbox{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:300;align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:12px;object-fit:contain}

/* ── OVERLAY SIDEBAR MOBILE ──────────────────────────── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;
}
@media(max-width:700px){.sidebar-overlay.show{display:block}}

/* ── SCROLLBAR GERAL ─────────────────────────────────── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── ANIMAÇÕES ENTRADA ───────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-row{animation:fadeUp .2s ease}

/* ── TOAST ───────────────────────────────────────────── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;
  opacity:0;transition:all .3s;pointer-events:none;z-index:400;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Incoming call ring animation */
@keyframes ring{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.call-box.ringing{animation:ring 1s infinite}
</style>
</head>
<body>

<!-- ═══════════════════════════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>🏠 FamilyChat</h1>
      <p>Seu chat privado da família</p>
    </div>
    <div class="avatar-grid" id="avatarGrid"></div>
    <input class="inp" type="password" id="loginPass" placeholder="🔑 Senha (padrão: familia123)"/>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr">Usuário ou senha incorretos</div>
  </div>
</div>

<!-- ═══════════════════════════════════ APP ════════════════ -->
<div id="app" style="display:flex">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="myAvatar">😀</div>
      <div class="my-info">
        <div class="my-name" id="myName">—</div>
        <div class="my-status">Online</div>
      </div>
    </div>

    <div class="sidebar-section">Salas</div>
    <div class="room-list" id="roomList"></div>

    <div class="online-section">
      <div class="online-title">Online agora</div>
      <div class="online-list" id="onlineList"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <div class="chat-header-icon" id="chatIcon">🏠</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatName">Selecione uma sala</div>
        <div class="chat-header-sub" id="chatSub"></div>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div style="text-align:center;margin-top:60px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:12px">🏠</div>
        <div style="font-size:14px">Selecione uma sala para começar</div>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span id="typingText"></span>
    </div>

    <div class="input-area" id="inputArea" style="display:none">
      <div class="reply-bar" id="replyBar">
        <span>↩</span>
        <span class="reply-bar-text" id="replyBarText"></span>
        <button class="reply-close" onclick="cancelReply()">✕</button>
      </div>
      <div class="input-row">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <textarea class="msg-input" id="msgInput" placeholder="Mensagem..." rows="1"
          oninput="autoResize(this);onTyping()"
          onkeydown="handleKey(event)"></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="showCallPicker()">📞</button>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,.pdf,.doc,.docx" onchange="handleFile(event)"/>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════ CALL MODAL ════════ -->
<div class="call-overlay" id="callOverlay">
  <div class="call-box" id="callBox">
    <div class="call-avatar" id="callAvatar">👤</div>
    <div class="call-name" id="callName">—</div>
    <div class="call-status" id="callStatus">Chamando...</div>
    <div class="call-timer" id="callTimer">0:00</div>
    <div class="call-audio-vis" id="audioVis" style="display:none">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="call-actions" id="callActions"></div>
  </div>
</div>

<!-- ═══════════════════════════════════ LIGHTBOX ══════════ -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lightboxImg"/>
</div>

<!-- ═══════════════════════════════════ TOAST ════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════ CALL PICKER ══════ -->
<div class="call-overlay" id="callPicker" style="display:none">
  <div class="call-box">
    <div style="font-size:24px;margin-bottom:8px">📞 Ligar para...</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px">Escolha quem está online</div>
    <div id="callPickerList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>
    <button class="btn-primary" style="background:var(--surface2);color:var(--muted);margin-top:8px" onclick="document.getElementById('callPicker').style.display='none'">Cancelar</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  FamilyChat — Frontend Script
// ══════════════════════════════════════════════════════════════

let socket = null;
let currentUser = null;
let currentRoom = null;
let replyTarget = null;
let typingTimeout = null;
let callState = { active: false, peer: null, pc: null, stream: null, timerInterval: null, seconds: 0 };
let onlineUsers = [];
let unreadCounts = {};

// ── LOGIN ─────────────────────────────────────────────────────
const USERS_PRESET = [
  {username:'pai',   name:'Pai',   avatar:'👨'},
  {username:'mae',   name:'Mãe',   avatar:'👩'},
  {username:'filho', name:'Filho', avatar:'👦'},
  {username:'filha', name:'Filha', avatar:'👧'},
  {username:'vovo',  name:'Vovó',  avatar:'👵'},
];
let selectedUser = null;

document.addEventListener('DOMContentLoaded', () => {
  // Render avatar grid
  const grid = document.getElementById('avatarGrid');
  USERS_PRESET.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'avatar-btn';
    btn.innerHTML = `<span class="av-emoji">${u.avatar}</span><span class="av-name">${u.name}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedUser = u;
    };
    grid.appendChild(btn);
  });

  // Auto-login se tiver token salvo
  const token = localStorage.getItem('fc_token');
  const user  = localStorage.getItem('fc_user');
  if (token && user) {
    currentUser = JSON.parse(user);
    initApp(token);
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

async function doLogin() {
  if (!selectedUser) { showToast('Escolha seu perfil!'); return; }
  const pass = document.getElementById('loginPass').value;
  try {
    const res = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: selectedUser.username, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('loginErr').style.display='block'; return; }
    localStorage.setItem('fc_token', data.token);
    localStorage.setItem('fc_user', JSON.stringify(data.user));
    currentUser = data.user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp(data.token);
  } catch(e) { document.getElementById('loginErr').style.display='block'; }
}

// ── INIT APP ─────────────────────────────────────────────────
function initApp(token) {
  document.getElementById('myAvatar').textContent = currentUser.avatar;
  document.getElementById('myName').textContent   = currentUser.name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display    = 'flex';

  // Socket.IO
  socket = io({ auth: { token } });

  socket.on('connect', () => loadRooms());
  socket.on('connect_error', () => { logout(); });

  socket.on('message:new', (msg) => {
    if (msg.room === currentRoom) {
      appendMessage(msg);
      scrollBottom();
    } else {
      unreadCounts[msg.room] = (unreadCounts[msg.room] || 0) + 1;
      renderRoomBadges();
      if (Notification.permission === 'granted') {
        new Notification(`${msg.userAvatar} ${msg.userName}`, { body: msg.text || '📎 Arquivo', icon: '/favicon.ico' });
      }
    }
  });

  socket.on('users:online', (users) => {
    onlineUsers = users;
    renderOnlineUsers();
  });

  socket.on('typing:update', ({ user, typing }) => {
    const el = document.getElementById('typingIndicator');
    const txt = document.getElementById('typingText');
    if (typing) { txt.textContent = `${user} está digitando...`; el.style.display = 'flex'; }
    else { el.style.display = 'none'; }
  });

  // Chamadas WebRTC
  socket.on('call:incoming', handleIncomingCall);
  socket.on('call:answered', handleCallAnswered);
  socket.on('call:ice',      handleIceCandidate);
  socket.on('call:ended',    handleCallEnded);
  socket.on('call:rejected', () => { showToast('Chamada rejeitada'); endCall(); });

  // Notificações
  if (Notification.permission === 'default') Notification.requestPermission();
}

// ── SALAS ────────────────────────────────────────────────────
async function loadRooms() {
  const token = localStorage.getItem('fc_token');
  const res = await fetch('/api/rooms', { headers: { Authorization: `Bearer ${token}` } });
  const rooms = await res.json();
  renderRooms(rooms);
}

function renderRooms(rooms) {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  rooms.forEach(room => {
    const div = document.createElement('div');
    div.className = `room-item${currentRoom === room.id ? ' active' : ''}`;
    div.id = `room-${room.id}`;
    div.onclick = () => openRoom(room);
    div.innerHTML = `
      <div class="room-icon">${room.icon}</div>
      <div class="room-info">
        <div class="room-name">${room.name}</div>
        <div class="room-desc">${room.description}</div>
      </div>
      ${unreadCounts[room.id] ? `<div class="room-badge">${unreadCounts[room.id]}</div>` : ''}
    `;
    list.appendChild(div);
  });
}

function renderRoomBadges() { loadRooms(); }

async function openRoom(room) {
  currentRoom = room.id;
  unreadCounts[room.id] = 0;

  document.getElementById('chatIcon').textContent  = room.icon;
  document.getElementById('chatName').textContent  = room.name;
  document.getElementById('chatSub').textContent   = room.description;
  document.getElementById('inputArea').style.display = 'block';

  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const ri = document.getElementById(`room-${room.id}`);
  if (ri) ri.classList.add('active');

  socket.emit('room:join', room.id);
  await loadMessages(room.id);
  closeSidebar();
}

async function loadMessages(roomId) {
  const token = localStorage.getItem('fc_token');
  const res = await fetch(`/api/messages/${roomId}`, { headers: { Authorization: `Bearer ${token}` } });
  const msgs = await res.json();
  const area = document.getElementById('messagesArea');
  area.innerHTML = '';

  let lastDate = '';
  msgs.forEach(msg => {
    const d = new Date(msg.createdAt).toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    if (d !== lastDate) {
      lastDate = d;
      const el = document.createElement('div');
      el.className = 'msg-date';
      el.innerHTML = `<span>${d}</span>`;
      area.appendChild(el);
    }
    appendMessage(msg, false);
  });
  scrollBottom(false);
}

// ── MENSAGENS ────────────────────────────────────────────────
function appendMessage(msg, animate = true) {
  const area = document.getElementById('messagesArea');
  const isMine = msg.userId === currentUser.id;
  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
  if (!animate) row.style.animation = 'none';

  const time = new Date(msg.createdAt).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  let content = '';

  if (msg.replyTo) {
    content += `<div class="reply-preview">↩ ${msg.replyTo.userName}: ${msg.replyTo.text || '📎'}</div>`;
  }

  if (msg.type === 'file' && msg.fileUrl) {
    const isImage = msg.fileType?.startsWith('image/');
    if (isImage) {
      content += `<img class="msg-img" src="${msg.fileUrl}" onclick="openLightbox('${msg.fileUrl}')" loading="lazy"/>`;
    } else {
      content += `<a class="msg-file" href="${msg.fileUrl}" download="${msg.fileName}" target="_blank">
        <span class="msg-file-icon">📄</span><span>${msg.fileName}</span></a>`;
    }
  }

  if (msg.text) content += `<div>${escapeHtml(msg.text)}</div>`;
  content += `<div class="msg-time">${time}</div>`;

  row.innerHTML = `
    ${!isMine ? `<div class="msg-avatar" style="border:2px solid ${msg.userColor}">${msg.userAvatar}</div>` : ''}
    <div class="msg-bubble" ondblclick="setReply('${msg.id}','${escapeHtml(msg.userName)}','${escapeHtml(msg.text||'')}')">
      ${!isMine ? `<div class="msg-sender" style="color:${msg.userColor}">${msg.userName}</div>` : ''}
      ${content}
    </div>
    ${isMine ? `<div class="msg-avatar" style="border:2px solid ${msg.userColor}">${msg.userAvatar}</div>` : ''}
  `;
  area.appendChild(row);
}

function scrollBottom(smooth = true) {
  const area = document.getElementById('messagesArea');
  area.scrollTo({ top: area.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ENVIO ────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || !currentRoom) return;

  socket.emit('message:send', {
    room: currentRoom,
    text,
    replyTo: replyTarget
  });

  input.value = '';
  autoResize(input);
  cancelReply();
  socket.emit('typing:stop', currentRoom);
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const token = localStorage.getItem('fc_token');
  const form  = new FormData();
  form.append('file', file);
  showToast('📤 Enviando arquivo...');
  try {
    const res  = await fetch('/api/upload', { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: form });
    const data = await res.json();
    socket.emit('message:file', {
      room: currentRoom, fileUrl: data.url,
      fileName: data.name, fileType: data.type, replyTo: replyTarget
    });
    cancelReply();
    showToast('✅ Enviado!');
  } catch { showToast('❌ Erro no upload'); }
  e.target.value = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

let typingActive = false;
function onTyping() {
  if (!currentRoom) return;
  if (!typingActive) { socket.emit('typing:start', currentRoom); typingActive = true; }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => { socket.emit('typing:stop', currentRoom); typingActive = false; }, 1500);
}

// ── REPLY ────────────────────────────────────────────────────
function setReply(id, name, text) {
  replyTarget = { id, userName: name, text };
  const bar = document.getElementById('replyBar');
  bar.style.display = 'flex';
  document.getElementById('replyBarText').textContent = `${name}: ${text}`;
  document.getElementById('msgInput').focus();
}

function cancelReply() {
  replyTarget = null;
  document.getElementById('replyBar').style.display = 'none';
}

// ── ONLINE USERS ─────────────────────────────────────────────
function renderOnlineUsers() {
  const list = document.getElementById('onlineList');
  list.innerHTML = '';
  onlineUsers.forEach(u => {
    if (u.id === currentUser?.id) return;
    const el = document.createElement('div');
    el.className = 'online-user';
    el.innerHTML = `<span class="online-dot"></span>${u.avatar} ${u.name}`;
    el.onclick = () => initiateCall(u);
    list.appendChild(el);
  });
}

// ── SIDEBAR MOBILE ────────────────────────────────────────────
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

// ── LIGHTBOX ─────────────────────────────────────────────────
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── CHAMADAS WebRTC ───────────────────────────────────────────
function showCallPicker() {
  const picker  = document.getElementById('callPicker');
  const picList = document.getElementById('callPickerList');
  picList.innerHTML = '';
  const others = onlineUsers.filter(u => u.id !== currentUser.id);
  if (others.length === 0) {
    picList.innerHTML = '<p style="color:var(--muted);font-size:13px">Ninguém online agora</p>';
  } else {
    others.forEach(u => {
      const btn = document.createElement('button');
      btn.className = 'btn-primary';
      btn.style.cssText = 'display:flex;align-items:center;gap:10px;justify-content:center';
      btn.innerHTML = `<span style="font-size:22px">${u.avatar}</span> ${u.name}`;
      btn.onclick = () => { picker.style.display = 'none'; initiateCall(u); };
      picList.appendChild(btn);
    });
  }
  picker.style.display = 'flex';
}

async function initiateCall(peer) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    callState.stream  = stream;
    callState.peer    = peer;
    callState.active  = true;

    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    callState.pc = pc;

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('call:ice', { targetUserId: peer.id, candidate: e.candidate });
    };

    pc.ontrack = (e) => {
      const audio = document.getElementById('remoteAudio') || (() => {
        const a = document.createElement('audio'); a.id='remoteAudio'; a.autoplay=true; document.body.appendChild(a); return a;
      })();
      audio.srcObject = e.streams[0];
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('call:start', { targetUserId: peer.id, offer, callType: 'audio' });

    showCallUI({ name: peer.name, avatar: peer.avatar, status: 'Chamando...', mode: 'outgoing', peer });
  } catch(e) { showToast('❌ Sem acesso ao microfone'); }
}

async function handleIncomingCall({ from, offer, callType }) {
  callState.incomingOffer = offer;
  callState.peer = from;
  showCallUI({ name: from.name, avatar: from.avatar, status: 'Chamada recebida', mode: 'incoming', peer: from });
}

async function acceptCall() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    callState.stream = stream;
    callState.active = true;

    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    callState.pc = pc;

    stream.getTracks().forEach(t => pc.addTrack(t, stream));

    pc.onicecandidate = (e) => {
      if (e.candidate) socket.emit('call:ice', { targetUserId: callState.peer.id, candidate: e.candidate });
    };

    pc.ontrack = (e) => {
      const audio = document.getElementById('remoteAudio') || (() => {
        const a = document.createElement('audio'); a.id='remoteAudio'; a.autoplay=true; document.body.appendChild(a); return a;
      })();
      audio.srcObject = e.streams[0];
    };

    await pc.setRemoteDescription(callState.incomingOffer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('call:answer', { targetUserId: callState.peer.id, answer });

    startCallTimer();
    document.getElementById('callStatus').textContent = 'Em chamada';
    document.getElementById('callTimer').style.display = 'block';
    document.getElementById('audioVis').style.display  = 'flex';
    document.getElementById('callActions').innerHTML = callActions('active');
    document.getElementById('callBox').classList.remove('ringing');
  } catch(e) { showToast('❌ Sem acesso ao microfone'); }
}

async function handleCallAnswered({ answer }) {
  await callState.pc?.setRemoteDescription(answer);
  startCallTimer();
  document.getElementById('callStatus').textContent = 'Em chamada';
  document.getElementById('callTimer').style.display = 'block';
  document.getElementById('audioVis').style.display  = 'flex';
  document.getElementById('callActions').innerHTML = callActions('active');
}

async function handleIceCandidate({ candidate }) {
  try { await callState.pc?.addIceCandidate(candidate); } catch {}
}

function handleCallEnded() { showToast('📵 Chamada encerrada'); endCall(); }

function endCall() {
  if (callState.stream)       callState.stream.getTracks().forEach(t => t.stop());
  if (callState.pc)           callState.pc.close();
  if (callState.timerInterval) clearInterval(callState.timerInterval);
  if (callState.peer && callState.active) socket.emit('call:end', { targetUserId: callState.peer.id });
  callState = { active: false, peer: null, pc: null, stream: null, timerInterval: null, seconds: 0 };
  document.getElementById('callOverlay').style.display = 'none';
}

function rejectCall() {
  socket.emit('call:reject', { targetUserId: callState.peer.id });
  callState = { active: false, peer: null, pc: null, stream: null, timerInterval: null, seconds: 0 };
  document.getElementById('callOverlay').style.display = 'none';
}

let isMuted = false;
function toggleMute() {
  if (callState.stream) {
    callState.stream.getAudioTracks().forEach(t => t.enabled = isMuted);
    isMuted = !isMuted;
    document.getElementById('callActions').innerHTML = callActions('active');
    showToast(isMuted ? '🔇 Mudo' : '🎙️ Microfone ativado');
  }
}

function callActions(mode) {
  if (mode === 'incoming') {
    return `<button class="call-btn accept" onclick="acceptCall()">✅</button>
            <button class="call-btn end"    onclick="rejectCall()">📵</button>`;
  }
  return `<button class="call-btn mute" onclick="toggleMute()">${isMuted ? '🔇' : '🎙️'}</button>
          <button class="call-btn end"  onclick="endCall()">📵</button>`;
}

function showCallUI({ name, avatar, status, mode, peer }) {
  document.getElementById('callAvatar').textContent  = avatar;
  document.getElementById('callName').textContent    = name;
  document.getElementById('callStatus').textContent  = status;
  document.getElementById('callTimer').style.display = 'none';
  document.getElementById('audioVis').style.display  = 'none';
  document.getElementById('callActions').innerHTML   = callActions(mode);
  document.getElementById('callOverlay').style.display = 'flex';
  if (mode === 'incoming') document.getElementById('callBox').classList.add('ringing');
  else document.getElementById('callBox').classList.remove('ringing');
}

function startCallTimer() {
  callState.seconds = 0;
  callState.timerInterval = setInterval(() => {
    callState.seconds++;
    const m = Math.floor(callState.seconds / 60);
    const s = callState.seconds % 60;
    document.getElementById('callTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function logout() {
  localStorage.removeItem('fc_token');
  localStorage.removeItem('fc_user');
  location.reload();
}
</script>
